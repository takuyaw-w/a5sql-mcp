name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const { readFileSync } = require("node:fs");

          const packagePaths = [
            "packages/parser/package.json",
            "packages/core/package.json",
            "packages/cli/package.json",
          ];
          const packages = packagePaths.map((packagePath) => {
            const pkg = JSON.parse(readFileSync(packagePath, "utf8"));
            return { name: pkg.name, version: pkg.version };
          });
          const expectedTag = `v${packages[0].version}`;
          const actualTag = process.env.TAG_NAME;

          if (actualTag !== expectedTag) {
            console.error(`Tag mismatch: expected ${expectedTag}, got ${actualTag}`);
            process.exit(1);
          }

          const mismatched = packages.filter((pkg) => pkg.version !== packages[0].version);
          if (mismatched.length > 0) {
            console.error("Package versions must match before publishing:");
            for (const pkg of packages) {
              console.error(`- ${pkg.name}@${pkg.version}`);
            }
            process.exit(1);
          }

          console.log(`Publishing ${packages.map((pkg) => `${pkg.name}@${pkg.version}`).join(", ")}`);
          NODE

      - name: Run release checks
        run: pnpm release:check

      - name: Publish packages with npm token
        if: env.HAS_NPM_TOKEN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -r --filter "./packages/*" publish --access public --no-git-checks

      - name: Publish packages with trusted publishing
        if: env.HAS_NPM_TOKEN != 'true'
        run: pnpm -r --filter "./packages/*" publish --access public --provenance --no-git-checks
